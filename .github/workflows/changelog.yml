name: Changelog

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog entry
        id: changelog
        uses: orhun/git-cliff-action@v3
        with:
          config: cliff.toml
          args: --unreleased --tag HEAD

      - name: Update CHANGELOG.md
        run: |
          echo "${{ steps.changelog.outputs.changelog }}" > /tmp/new_entry.md
          if [ -f CHANGELOG.md ]; then
            cat /tmp/new_entry.md CHANGELOG.md > /tmp/merged.md
            mv /tmp/merged.md CHANGELOG.md
          else
            mv /tmp/new_entry.md CHANGELOG.md
          fi

      - name: Open PR with changelog update
        uses: peter-evans/create-pull-request@v6
        with:
          branch: changelog/auto-update
          title: "chore: update CHANGELOG.md"
          body: "Automatically generated changelog update from conventional commits."
          commit-message: "chore: update CHANGELOG.md"
